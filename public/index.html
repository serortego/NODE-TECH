<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NODE | Automatización inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        node: {
                            dark: '#0D253E',   /* Azul muy oscuro */
                            teal: '#2B93A6',   /* Teal principal */
                            tealLight: '#38BDF8',
                            tealDark: '#133947',
                            bg: '#F8FAFC',     /* Fondo general app */
                            sidebar: '#0F172A' /* Slate 900 */
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Estilos base y transiciones */
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Fondo sutil para la parte izquierda del login */
        .login-bg {
            background: linear-gradient(135deg, #f0f7fa 0%, #e1eff5 100%);
            position: relative;
            overflow: hidden;
        }
        .login-bg::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(43,147,166,0.05) 0%, transparent 20%),
                        radial-gradient(circle, rgba(13,37,62,0.03) 0%, transparent 20%);
            background-size: 100px 100px;
            background-position: 0 0, 50px 50px;
        }

        /* Scrollbar styling for a cleaner look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-node-bg text-slate-800 antialiased h-screen w-full overflow-hidden flex">

    <!-- ========================================== -->
    <!-- PANTALLA DE LOGIN (Basada en la imagen)    -->
    <!-- ========================================== -->
    <div id="login-view" class="flex w-full h-full absolute inset-0 z-50 bg-white transition-opacity duration-500">

        <!-- Mitad Izquierda (Marca/Decorativa) -->
        <div class="hidden lg:flex w-1/2 login-bg flex-col justify-center items-center p-12 relative">

            <!-- Logo SVG Recreado -->
            <div class="mb-6 fade-in" style="animation-delay: 0.1s;">
                <svg width="180" height="180" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <!-- Líneas diagonales -->
                    <line x1="20" y1="20" x2="80" y2="80" stroke="#0D253E" stroke-width="3" stroke-linecap="round"/>
                    <line x1="20" y1="80" x2="80" y2="20" stroke="#0D253E" stroke-width="3" stroke-linecap="round"/>
                    <!-- Líneas rectas -->
                    <line x1="50" y1="10" x2="50" y2="90" stroke="#0D253E" stroke-width="3" stroke-linecap="round"/>
                    <line x1="10" y1="50" x2="90" y2="50" stroke="#0D253E" stroke-width="3" stroke-linecap="round"/>

                    <!-- Nodos exteriores -->
                    <circle cx="50" cy="10" r="5" fill="#2B93A6" stroke="#0D253E" stroke-width="2"/>
                    <circle cx="50" cy="90" r="5" fill="#2B93A6" stroke="#0D253E" stroke-width="2"/>
                    <circle cx="10" cy="50" r="5" fill="#2B93A6" stroke="#0D253E" stroke-width="2"/>
                    <circle cx="90" cy="50" r="5" fill="#2B93A6" stroke="#0D253E" stroke-width="2"/>
                    <circle cx="20" cy="20" r="4" fill="#2B93A6" stroke="#0D253E" stroke-width="2"/>
                    <circle cx="80" cy="80" r="4" fill="#2B93A6" stroke="#0D253E" stroke-width="2"/>
                    <circle cx="20" cy="80" r="4" fill="#2B93A6" stroke="#0D253E" stroke-width="2"/>
                    <circle cx="80" cy="20" r="4" fill="#2B93A6" stroke="#0D253E" stroke-width="2"/>

                    <!-- Cuadro central -->
                    <rect x="35" y="35" width="30" height="30" fill="white" stroke="#0D253E" stroke-width="4"/>
                    <rect x="42" y="42" width="16" height="16" fill="#2B93A6"/>
                </svg>
            </div>

            <h1 class="text-6xl font-black text-node-dark tracking-wide mb-2 fade-in" style="animation-delay: 0.2s;">NODE</h1>
            <p class="text-node-teal text-xl font-medium text-center max-w-xs fade-in" style="animation-delay: 0.3s;">Automatización inteligente para negocios</p>

            <!-- Decoración sutil fondo -->
            <div class="absolute bottom-10 opacity-30 fade-in" style="animation-delay: 0.5s;">
                <svg width="80" height="80" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <!-- Versión pequeña y más transparente -->
                    <line x1="20" y1="20" x2="80" y2="80" stroke="#0D253E" stroke-width="2"/>
                    <line x1="20" y1="80" x2="80" y2="20" stroke="#0D253E" stroke-width="2"/>
                    <line x1="50" y1="10" x2="50" y2="90" stroke="#0D253E" stroke-width="2"/>
                    <line x1="10" y1="50" x2="90" y2="50" stroke="#0D253E" stroke-width="2"/>
                    <rect x="40" y="40" width="20" height="20" fill="white" stroke="#0D253E" stroke-width="2"/>
                    <rect x="45" y="45" width="10" height="10" fill="#2B93A6"/>
                </svg>
            </div>
        </div>

        <!-- Mitad Derecha (Formulario) -->
        <div class="w-full lg:w-1/2 flex justify-center items-center p-8 bg-white overflow-y-auto">
            <div class="w-full max-w-md slide-up">
                <!-- Logo para móviles (Oculto en desktop) -->
                <div class="lg:hidden flex items-center justify-center mb-8">
                    <span class="text-3xl font-black text-node-dark mr-2">NODE</span>
                    <div class="w-8 h-8 bg-node-teal rounded relative">
                        <div class="absolute inset-2 bg-white"></div>
                    </div>
                </div>

                <h2 class="text-4xl font-bold text-node-dark mb-2">Bienvenido <span class="wave">👋</span></h2>
                <p class="text-slate-500 mb-10">Inicia sesión en tu cuenta</p>

                <form onsubmit="event.preventDefault(); login();">
                    <!-- Email -->
                    <div class="mb-5">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Correo electrónico</label>
                        <input type="email" placeholder="tuemail@negocio.com" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-node-teal focus:border-transparent transition-all" value="admin@node.com" required>
                    </div>

                    <!-- Password -->
                    <div class="mb-5 relative">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Contraseña</label>
                        <input type="password" id="pwd" placeholder="••••••••" class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-node-teal focus:border-transparent transition-all" value="password123" required>
                        <button type="button" onclick="togglePwd()" class="absolute right-4 top-10 text-slate-400 hover:text-slate-600 focus:outline-none">
                            <i class="far fa-eye" id="pwd-icon"></i>
                        </button>
                    </div>

                    <!-- Options -->
                    <div class="flex items-center justify-between mb-8">
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" class="form-checkbox h-4 w-4 text-node-teal rounded border-slate-300 focus:ring-node-teal transition duration-150 ease-in-out">
                            <span class="ml-2 text-sm text-slate-600">Recuérdame</span>
                        </label>
                        <a href="#" class="text-sm text-node-teal hover:underline font-medium">¿Olvidaste tu contraseña?</a>
                    </div>

                    <!-- Login Btn -->
                    <button type="submit" class="w-full bg-[#3B82F6] hover:bg-blue-600 text-white font-semibold py-3 px-4 rounded-lg transition-colors shadow-sm mb-6">
                        Iniciar sesión
                    </button>

                    <!-- Divider -->
                    <div class="relative flex items-center justify-center mb-6">
                        <div class="border-t border-slate-200 w-full"></div>
                        <span class="bg-white px-4 text-sm text-slate-400 absolute">O continuar con</span>
                    </div>

                    <!-- Google Btn -->
                    <button type="button" class="w-full bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 font-medium py-3 px-4 rounded-lg transition-colors flex items-center justify-center gap-2">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" class="w-5 h-5">
                        Continuar con Google
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- DASHBOARD PRINCIPAL (Basado en el Python)  -->
    <!-- ========================================== -->
    <div id="dashboard-view" class="flex w-full h-full opacity-0 pointer-events-none transition-opacity duration-500 hidden">

        <!-- SIDEBAR -->
        <aside class="w-64 bg-node-sidebar flex flex-col h-full shrink-0 shadow-xl z-20">
            <!-- Logo area -->
            <div class="h-24 flex flex-col items-center justify-center mt-6 mb-4">
                <div class="flex items-center text-white text-3xl font-black tracking-widest font-sans">
                    NO<span class="text-node-teal">DE</span>
                </div>
            </div>

            <!-- Menu label -->
            <div class="px-6 py-2">
                <p class="text-slate-500 text-xs font-bold uppercase tracking-wider">Workspace</p>
            </div>

            <!-- Navigation -->
            <nav class="flex-1 px-3 space-y-2 mt-2">
                <button onclick="switchTab('org', this)" class="nav-btn w-full flex items-center text-left px-5 py-3 rounded-full text-node-tealLight bg-node-tealDark font-semibold transition-all group">
                    <i class="fas fa-sitemap w-5 mr-3 text-center"></i> Organización
                </button>
                <button onclick="switchTab('prod', this)" class="nav-btn w-full flex items-center text-left px-5 py-3 rounded-full text-slate-400 hover:text-slate-100 hover:bg-white/5 font-medium transition-all group">
                    <i class="fas fa-chart-line w-5 mr-3 text-center"></i> Productividad
                </button>
                <button onclick="switchTab('cont', this)" class="nav-btn w-full flex items-center text-left px-5 py-3 rounded-full text-slate-400 hover:text-slate-100 hover:bg-white/5 font-medium transition-all group">
                    <i class="fas fa-wallet w-5 mr-3 text-center"></i> Contabilidad
                </button>
            </nav>

            <!-- Bottom Exit -->
            <div class="p-4 mb-4">
                <button onclick="logout()" class="w-full flex items-center text-left px-5 py-3 rounded-full text-slate-500 hover:text-red-400 hover:bg-red-500/10 font-medium transition-all">
                    <i class="fas fa-sign-out-alt w-5 mr-3 text-center"></i> Cerrar sesión
                </button>
            </div>
        </aside>

        <!-- MAIN AREA -->
        <main class="flex-1 flex flex-col h-full bg-node-bg relative overflow-hidden">

            <!-- TOP BAR -->
            <header class="h-20 flex items-center justify-between px-10 shrink-0">
                <!-- Search -->
                <div class="relative w-80">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" placeholder="Buscar en NODE..." class="w-full py-2.5 pl-10 pr-4 bg-white border border-slate-200 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-node-teal focus:border-transparent text-slate-600 shadow-sm">
                </div>

                <!-- Avatar -->
                <div class="flex items-center gap-4">
                    <button class="text-slate-400 hover:text-slate-600 relative">
                        <i class="far fa-bell text-xl"></i>
                        <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full"></span>
                    </button>
                    <div class="w-10 h-10 rounded-full bg-node-teal text-white flex items-center justify-center font-bold text-sm shadow-md cursor-pointer hover:bg-node-dark transition-colors">
                        JD
                    </div>
                </div>
            </header>

            <!-- CONTENT CARD -->
            <section class="flex-1 p-10 pt-4 overflow-y-auto">
                <div class="bg-white rounded-2xl shadow-[0_10px_30px_rgba(0,0,0,0.03)] p-10 min-h-full flex flex-col slide-up" id="main-card">

                    <!-- Dynamic Header -->
                    <div class="mb-6">
                        <h2 id="module-title" class="text-3xl font-extrabold text-slate-900 mb-2">Panel de Organización</h2>
                        <p id="module-desc" class="text-slate-500 text-lg">Selecciona una herramienta para gestionar la estructura de tu empresa y empleados.</p>
                    </div>

                    <!-- Divider -->
                    <div class="h-px bg-slate-100 w-full mb-8"></div>

                    <!-- Tools Grid (Placeholders as defined in Python) -->
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 flex-1 content-start" id="tools-grid">
                        <!-- Populated by JS -->
                    </div>

                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script>
        // --- 1. Lógica de Login ---
        function togglePwd() {
            const pwdInput = document.getElementById('pwd');
            const icon = document.getElementById('pwd-icon');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                pwdInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function login() {
            const loginView = document.getElementById('login-view');
            const dashView = document.getElementById('dashboard-view');

            // Fade out login
            loginView.style.opacity = '0';

            setTimeout(() => {
                loginView.classList.add('hidden');
                loginView.classList.remove('flex');

                // Show dashboard
                dashView.classList.remove('hidden');
                dashView.classList.remove('pointer-events-none');
                // Allow browser to render display:flex before transitioning opacity
                requestAnimationFrame(() => {
                    dashView.style.opacity = '1';
                    // Initialize first tab
                    renderTools();
                });
            }, 500);
        }

        function logout() {
            const loginView = document.getElementById('login-view');
            const dashView = document.getElementById('dashboard-view');

            dashView.style.opacity = '0';
            dashView.classList.add('pointer-events-none');

            setTimeout(() => {
                dashView.classList.add('hidden');

                loginView.classList.remove('hidden');
                loginView.classList.add('flex');

                requestAnimationFrame(() => {
                    loginView.style.opacity = '1';
                });
            }, 500);
        }

        // --- 2. Lógica del Dashboard (Simulando QStackedWidget) ---
        const modulesData = {
            'org': {
                title: 'Panel de Organización',
                desc: 'Selecciona una herramienta para gestionar la estructura de tu empresa y empleados.',
                icon: 'fa-sitemap'
            },
            'prod': {
                title: 'Métricas de Productividad',
                desc: 'Herramientas analíticas para evaluar el rendimiento de tus procesos B2B.',
                icon: 'fa-chart-line'
            },
            'cont': {
                title: 'Centro de Contabilidad',
                desc: 'Utilidades para la gestión de facturas, control de gastos y balances financieros.',
                icon: 'fa-wallet'
            }
        };

        function switchTab(tabId, btnElement) {
            // 1. Reset all buttons
            const buttons = document.querySelectorAll('.nav-btn');
            buttons.forEach(btn => {
                btn.className = 'nav-btn w-full flex items-center text-left px-5 py-3 rounded-full text-slate-400 hover:text-slate-100 hover:bg-white/5 font-medium transition-all group';
            });

            // 2. Set active button
            btnElement.className = 'nav-btn w-full flex items-center text-left px-5 py-3 rounded-full text-node-tealLight bg-node-tealDark font-semibold transition-all group';

            // 3. Update Content (Animate)
            const card = document.getElementById('main-card');
            card.classList.remove('slide-up');

            // Trigger reflow to restart animation
            void card.offsetWidth;

            const data = modulesData[tabId];
            document.getElementById('module-title').textContent = data.title;
            document.getElementById('module-desc').textContent = data.desc;

            renderTools(data.icon);
            card.classList.add('slide-up');
        }

        function renderTools(iconClass = 'fa-puzzle-piece') {
            const grid = document.getElementById('tools-grid');
            grid.innerHTML = ''; // Clear

            // Recrear las "6 Herramientas" del código Python (Placeholders)
            for (let i = 1; i <= 6; i++) {
                const toolCard = document.createElement('div');
                toolCard.className = 'border-2 border-dashed border-slate-200 bg-slate-50 hover:bg-slate-100 hover:border-slate-300 rounded-xl h-36 flex flex-col items-center justify-center cursor-pointer transition-colors group';

                toolCard.innerHTML = `
                    <div class="w-12 h-12 rounded-full bg-white shadow-sm flex items-center justify-center mb-3 text-slate-400 group-hover:text-node-teal group-hover:scale-110 transition-transform">
                        <i class="fas ${iconClass} text-xl"></i>
                    </div>
                    <span class="text-slate-500 font-bold group-hover:text-slate-700 transition-colors">Herramienta ${i}</span>
                    <span class="text-xs text-slate-400 mt-1">(Próximamente)</span>
                `;

                // Efecto de clic visual
                toolCard.onclick = () => {
                    const originalBg = toolCard.className;
                    toolCard.classList.add('ring-4', 'ring-node-teal/20');
                    setTimeout(() => toolCard.classList.remove('ring-4', 'ring-node-teal/20'), 200);
                };

                grid.appendChild(toolCard);
            }
        }
    </script>
</body>
</html>
