<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" width="100%" height="100%">
    <defs>
        <radialGradient id="bgGradient" cx="50%" cy="50%" r="70%">
            <stop offset="0%" stop-color="#2c3540"/>
            <stop offset="100%" stop-color="#14181c"/>
        </radialGradient>

        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
            <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.7"/>
        </filter>

        <linearGradient id="textGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#19aab0"/>
            <stop offset="100%" stop-color="#106b6e"/>
        </linearGradient>
    </defs>

    <rect width="100%" height="100%" fill="url(#bgGradient)" rx="15"/>

    <g filter="url(#dropShadow)">
        
        <g fill="none" stroke="#106b6e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M 175 125 L 130 80 L 95 80"/>
            <path d="M 225 125 L 270 80 L 305 80"/>
            <path d="M 175 175 L 130 220 L 95 220"/>
            <path d="M 225 175 L 270 220 L 305 220"/>

            <path d="M 200 115 L 200 60 L 240 60"/>
            <path d="M 200 185 L 200 240 L 160 240"/>
            <path d="M 165 150 L 110 150 L 110 105"/>
            <path d="M 235 150 L 290 150 L 290 195"/>

            <path d="M 150 100 L 150 65 L 175 65"/>
            <path d="M 250 100 L 250 135 L 285 135"/>
            <path d="M 150 200 L 150 165 L 115 165"/>
            <path d="M 250 200 L 250 235 L 225 235"/>
        </g>

        <g fill="#00E5FF">
            <rect x="196" y="123" width="8" height="54" rx="2"/>
            <rect x="196" y="123" width="8" height="54" rx="2" transform="rotate(45 200 150)"/>
            <rect x="196" y="123" width="8" height="54" rx="2" transform="rotate(90 200 150)"/>
            <rect x="196" y="123" width="8" height="54" rx="2" transform="rotate(135 200 150)"/>
        </g>
        <circle cx="200" cy="150" r="18" fill="#1d232a"/>
        <circle cx="200" cy="150" r="12" fill="none" stroke="#00E5FF" stroke-width="3" filter="url(#glow)"/>
        <circle cx="200" cy="150" r="4.5" fill="#00E5FF" filter="url(#glow)"/>

    </g>

    <g fill="#00E5FF" filter="url(#glow)">
        <circle cx="95" cy="80" r="5.5"/>
        <circle cx="305" cy="80" r="5.5"/>
        <circle cx="95" cy="220" r="5.5"/>
        <circle cx="305" cy="220" r="5.5"/>
        <circle cx="240" cy="60" r="5.5"/>
        <circle cx="160" cy="240" r="5.5"/>
        <circle cx="110" cy="105" r="5.5"/>
        <circle cx="290" cy="195" r="5.5"/>
        <circle cx="175" cy="65" r="5.5"/>
        <circle cx="285" cy="135" r="5.5"/>
        <circle cx="115" cy="165" r="5.5"/>
        <circle cx="225" cy="235" r="5.5"/>
    </g>

    <g filter="url(#dropShadow)">
        <text x="350" y="145" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="95" fill="url(#textGradient)" letter-spacing="4">NODE</text>
        
        <text x="665" y="195" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="52" fill="#106b6e" text-anchor="end" letter-spacing="3">TECH</text>
        
        <text x="355" y="240" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="400" font-size="24" fill="#00E5FF" letter-spacing="0.5">Automatización Inteligente</text>
    </g>

</svg>
