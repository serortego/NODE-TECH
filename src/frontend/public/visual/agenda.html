<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style id="auth-loading">body{visibility:hidden!important}</style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NODE TECH | Agenda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #060D1A;
            color: #f1f5f9;
            min-height: 100vh;
        }
        /* Glass morphism */
        .glass {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }
        /* Botones */
        .btn-primary {
            background: #2B93A6;
            color: #fff;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #38BDF8; }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: #cbd5e1;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.14); }
        /* Keyframe solapamiento */
        @keyframes overlap-pulse {
            0%, 100% { box-shadow: 0 0 0 2px rgba(239,68,68,0.4); }
            50%       { box-shadow: 0 0 0 4px rgba(239,68,68,0.7); }
        }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(43,147,166,0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(43,147,166,0.6); }
        /* Inputs dark */
        input[type="date"], input[type="time"], input[type="number"], input[type="text"], select, textarea {
            color-scheme: dark;
        }
    </style>
</head>
<body data-default-view="agenda" class="min-h-screen">

    <!-- Contenedor principal — rellena toda la altura -->
    <main id="content-area" class="h-screen overflow-hidden bg-[#060D1A] p-4 flex flex-col">
        <!-- AgendaManager.render() inyecta aqui -->
    </main>

    <!-- Modal Nueva / Editar Cita -->
    <div id="modal-cita" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
        <div class="bg-[#0f1e35] border border-[rgba(43,147,166,0.25)] rounded-xl shadow-2xl w-full max-w-md max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between px-5 py-4 border-b border-[rgba(255,255,255,0.08)] sticky top-0 bg-[#0f1e35] z-10">
                <div class="flex items-center gap-2">
                    <i class="fas fa-calendar-plus text-[#2B93A6]"></i>
                    <h3 id="modal-cita-title" class="text-base font-bold text-white">Nueva cita</h3>
                </div>
                <button id="close-modal" class="text-slate-400 hover:text-white transition p-1">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <form id="form-cita" class="p-5 space-y-4">
                <input type="hidden" id="cita-id">

                <div>
                    <label class="block text-xs font-bold text-slate-300 mb-1">Cliente *</label>
                    <input type="text" id="cita-cliente" placeholder="Nombre del cliente" required
                        class="w-full px-3 py-2 bg-[rgba(255,255,255,0.06)] border border-[rgba(255,255,255,0.1)] text-white placeholder-slate-500 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#2B93A6]">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-300 mb-1">Servicio *</label>
                    <select id="cita-servicio" required
                        class="w-full px-3 py-2 bg-[rgba(255,255,255,0.06)] border border-[rgba(255,255,255,0.1)] text-white rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#2B93A6]">
                        <option value="" class="bg-[#0f1e35]">Selecciona un servicio</option>
                        <option value="Consultoria" class="bg-[#0f1e35]">Consultoria</option>
                        <option value="Asesoria" class="bg-[#0f1e35]">Asesoria</option>
                        <option value="Reunion" class="bg-[#0f1e35]">Reunion</option>
                        <option value="Proyecto" class="bg-[#0f1e35]">Proyecto</option>
                        <option value="Servicio general" class="bg-[#0f1e35]">Servicio general</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-300 mb-1">Fecha *</label>
                        <input type="date" id="cita-fecha" required
                            class="w-full px-3 py-2 bg-[rgba(255,255,255,0.06)] border border-[rgba(255,255,255,0.1)] text-white rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#2B93A6]">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-300 mb-1">Hora *</label>
                        <input type="time" id="cita-hora" value="09:00" required
                            class="w-full px-3 py-2 bg-[rgba(255,255,255,0.06)] border border-[rgba(255,255,255,0.1)] text-white rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#2B93A6]">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-300 mb-1">Duracion (min)</label>
                        <input type="number" id="cita-duracion" value="60" min="15" step="15" placeholder="60"
                            class="w-full px-3 py-2 bg-[rgba(255,255,255,0.06)] border border-[rgba(255,255,255,0.1)] text-white placeholder-slate-500 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#2B93A6]">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-300 mb-1">Importe (EUR)</label>
                        <input type="number" id="cita-precio" placeholder="0" min="0" step="5"
                            class="w-full px-3 py-2 bg-[rgba(255,255,255,0.06)] border border-[rgba(255,255,255,0.1)] text-white placeholder-slate-500 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#2B93A6]">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-300 mb-1">Empleado / Sala</label>
                    <select id="cita-recurso"
                        class="w-full px-3 py-2 bg-[rgba(255,255,255,0.06)] border border-[rgba(255,255,255,0.1)] text-white rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#2B93A6]">
                        <option value="" class="bg-[#0f1e35]">Auto-asignar</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-300 mb-1">Notas</label>
                    <textarea id="cita-notas" placeholder="Observaciones..." rows="2"
                        class="w-full px-3 py-2 bg-[rgba(255,255,255,0.06)] border border-[rgba(255,255,255,0.1)] text-white placeholder-slate-500 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-[#2B93A6] resize-none"></textarea>
                </div>

                <div class="flex gap-2 pt-2 border-t border-[rgba(255,255,255,0.08)]">
                    <button type="button" id="btn-cancelar-modal"
                        class="btn-secondary flex-1 py-2 rounded-lg text-sm">Cancelar</button>
                    <button type="submit"
                        class="btn-primary flex-1 py-2 rounded-lg text-sm">Guardar cita</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Auth guard -->
    <script type="module" src="../logic/auth.js"></script>
    <!-- Managers -->
    <script src="../logic/agenda.js"></script>
    <script src="../logic/empleados.js"></script>
    <script src="../logic/chatbot.js"></script>
    <script src="../logic/contabilidad.js"></script>
    <script src="../logic/navigation.js"></script>
</body>
</html>
