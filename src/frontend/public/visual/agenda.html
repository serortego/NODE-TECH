<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style id="auth-loading">body{visibility:hidden!important}</style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NODE TECH | Agenda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        node: {
                            dark: '#374151',
                            teal: '#3B82F6',
                        }
                    },
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: #F3F4F6; 
            color: #111827;
        }
        .text-node { color: #111827; }
        .bg-node-dark { background: #374151; }
        .bg-node-teal { background: #3B82F6; }
        .text-node-teal { color: #3B82F6; }
        .border-subtle { border-color: #E5E7EB; }
        .shadow-soft { box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); }
        
        /* Sidebar */
        .sidebar-item { 
            transition: all 0.2s ease; 
            color: #6B7280;
        }
        .sidebar-item:hover { 
            background: #F3F4F6; 
            color: #111827; 
        }
        .sidebar-item.active { 
            background: #3B82F6; 
            color: white; 
        }
        
        /* Granularidad visual */
        [data-tiempo] {
            position: relative;
        }
        
        /* Línea de hora actual */
        .time-indicator {
            height: 2px;
            background: #EF4444;
            position: absolute;
            left: 0;
            right: 0;
            z-index: 30;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body data-default-view="agenda" class="min-h-screen">
    <!-- Main Content -->
    <main class="min-h-screen bg-gray-50 p-4" id="content-area">
        <!-- Se genera con JavaScript -->
    </main>

    <!-- Modal: Crear/Editar Cita -->
    <div id="modal-cita" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-lg max-w-sm w-full mx-4 p-5">
            <div class="flex items-center justify-between mb-4">
                <h2 id="modal-title" class="text-lg font-bold text-gray-900">Nueva Cita</h2>
                <button id="close-modal" class="text-gray-400 hover:text-gray-600 text-2xl">
                    ×
                </button>
            </div>
            
            <form id="form-cita" class="space-y-3">
                <input type="hidden" id="cita-id">
                
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1">Cliente</label>
                    <input type="text" id="cita-cliente" placeholder="Nombre del cliente" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-node-teal text-sm" required>
                </div>
                
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1">Servicio</label>
                    <select id="cita-servicio" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-node-teal text-sm" required>
                        <option value="">Selecciona un servicio</option>
                        <option value="Corte">Corte</option>
                        <option value="Coloracion">Coloracion</option>
                        <option value="Peinado">Peinado</option>
                        <option value="Tratamiento Capilar">Tratamiento Capilar</option>
                        <option value="Reunion">Reunión</option>
                    </select>
                </div>
                
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1">Fecha</label>
                        <input type="date" id="cita-fecha" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-node-teal text-sm" required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-1">Hora</label>
                        <input type="time" id="cita-hora" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-node-teal text-sm" required>
                    </div>
                </div>
                
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1">Precio (EUR)</label>
                    <input type="number" id="cita-precio" placeholder="0.00" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-node-teal text-sm" step="0.01">
                </div>
                
                <div class="flex gap-2 pt-2">
                    <button type="submit" class="flex-1 bg-node-teal text-white font-bold py-2 rounded-lg hover:bg-blue-600 transition text-sm">Guardar</button>
                    <button type="button" id="btn-cancelar-modal" class="flex-1 border border-gray-300 text-gray-600 font-bold py-2 rounded-lg hover:bg-gray-50 transition text-sm">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Auth guard - Firebase authentication -->
    <script type="module" src="../logic/auth-guard.js"></script>
    <!-- Load all managers before navigation -->
    <script src="../logic/agenda.js"></script>
    <script src="../logic/empleados.js"></script>
    <script src="../logic/clientes.js"></script>
    <script src="../logic/finanzas.js"></script>
    <script src="../logic/chatbot.js"></script>
    <script src="../logic/navigation.js"></script>
    <script src="../logic/inicio.js"></script>
</body>
</html>
