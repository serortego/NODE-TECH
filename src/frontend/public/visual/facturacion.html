<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NODE | Facturación</title>
    <style id="auth-loading">body{visibility:hidden!important}</style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #F4F7FB; }
        .sidebar-item:hover { background: #EFF6FF; }
        .shadow-soft { box-shadow: 0 25px 50px rgba(15, 23, 42, 0.08); }
    </style>
</head>
<body class="min-h-screen">
    <div class="flex min-h-screen">

        <!-- Sidebar -->
        <aside class="w-72 border-r border-slate-200 bg-white shadow-sm flex flex-col flex-shrink-0">
            <div class="p-6">
                <div class="flex items-center gap-3">
                    <div class="h-12 w-12 rounded-3xl bg-blue-600 text-white flex items-center justify-center text-xl font-bold">N</div>
                    <div>
                        <p class="text-xs uppercase tracking-[0.35em] text-slate-500">NODE</p>
                        <h1 class="text-xl font-bold text-slate-950">Facturación</h1>
                    </div>
                </div>
            </div>
            <nav class="px-4 space-y-1 flex-1">
                <a href="inicio.html" class="sidebar-item flex items-center gap-3 rounded-3xl px-4 py-3 text-slate-700">
                    <i class="fas fa-home text-slate-400 w-5 text-center"></i>
                    <span>Inicio</span>
                </a>
                <a href="chatbot.html" class="sidebar-item flex items-center gap-3 rounded-3xl px-4 py-3 text-slate-700">
                    <i class="fas fa-robot text-slate-400 w-5 text-center"></i>
                    <span>Asistente</span>
                </a>
                <a href="agenda.html" class="sidebar-item flex items-center gap-3 rounded-3xl px-4 py-3 text-slate-700">
                    <i class="fas fa-calendar-alt text-slate-400 w-5 text-center"></i>
                    <span>Agenda</span>
                </a>
                <a href="clientes.html" class="sidebar-item flex items-center gap-3 rounded-3xl px-4 py-3 text-slate-700">
                    <i class="fas fa-users text-slate-400 w-5 text-center"></i>
                    <span>Clientes</span>
                </a>
                <a href="empleados.html" class="sidebar-item flex items-center gap-3 rounded-3xl px-4 py-3 text-slate-700">
                    <i class="fas fa-user-tie text-slate-400 w-5 text-center"></i>
                    <span>Empleados</span>
                </a>
                <a href="contabilidad.html" class="sidebar-item flex items-center gap-3 rounded-3xl px-4 py-3 text-slate-700">
                    <i class="fas fa-chart-line text-slate-400 w-5 text-center"></i>
                    <span>Contabilidad</span>
                </a>
                <a href="facturacion.html" class="sidebar-item flex items-center gap-3 rounded-3xl px-4 py-3 bg-blue-600 text-white shadow-sm">
                    <i class="fas fa-file-invoice-dollar w-5 text-center"></i>
                    <span>Facturación</span>
                </a>
                <a href="impuestos.html" class="sidebar-item flex items-center gap-3 rounded-3xl px-4 py-3 text-slate-700">
                    <i class="fas fa-percentage text-slate-400 w-5 text-center"></i>
                    <span>Impuestos</span>
                </a>
            </nav>
            <div class="p-4">
                <button onclick="window.logout()" class="w-full rounded-3xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-600 hover:bg-slate-50 transition">
                    <i class="fas fa-sign-out-alt mr-2"></i> Cerrar sesión
                </button>
            </div>
        </aside>

        <!-- Main -->
        <main class="flex-1 p-8 overflow-auto">
            <div class="max-w-6xl mx-auto">
                <div id="fact-standalone">
                    <p class="text-slate-400 text-sm text-center py-10"><i class="fas fa-spinner fa-spin mr-2"></i>Cargando...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="../logic/facturacion.js"></script>
    <script type="module" src="../logic/auth.js"></script>
</body>
</html>
