<body class="min-h-screen">

                        <p class="text-xs uppercase tracking-[0.35em] text-slate-500">NODE</p>
                        <h1 class="text-xl font-bold text-slate-950">Asistente</h1>
                    </div>
                </div>
                <p class="mt-4 text-sm text-slate-600">Asistente inteligente para tu agenda y CRM.</p>
            </div>
            <nav class="mt-8 px-4 space-y-1">
                <a href="inicio.html" class="sidebar-item flex items-center gap-3 rounded-3xl px-4 py-3 text-slate-700">

                <a href="agenda.html" class="sidebar-item flex items-center gap-3 rounded-3xl px-4 py-3 text-slate-700">
                    <i class="fas fa-calendar-alt text-slate-400 w-5 text-center"></i>

                <a href="empleados.html" class="sidebar-item flex items-center gap-3 rounded-3xl px-4 py-3 text-slate-700">

                <a href="finanzas.html" class="sidebar-item flex items-center gap-3 rounded-3xl px-4 py-3 text-slate-700">

        <main class="flex-1 p-8">
            <div class="rounded-[2rem] bg-white p-8 shadow-soft border border-slate-200">
                <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                    <div>
                        <p class="text-sm uppercase tracking-[0.35em] text-slate-500">Asistente</p>
                        <h2 class="mt-3 text-3xl font-extrabold text-slate-950">Chat operativo</h2>
                    </div>
                    <span class="inline-flex items-center gap-2 rounded-full bg-blue-50 px-4 py-2 text-sm font-semibold text-blue-700">
                        <i class="fas fa-robot"></i> Inteligencia de negocio
                    </span>
                </div>
                <div id="chatbot-container" class="mt-8 flex h-[520px] flex-col overflow-hidden rounded-[1.75rem] border border-slate-200 bg-slate-50">
                    <!-- Aquí se inyectará el diseño dinámico del ChatbotManager -->
                </div>
                <div class="mt-6 grid gap-3 sm:grid-cols-3">
                    <button type="button" onclick="addQuick('Crear cita para Cliente A mañana a las 10:00 para revisión')" class="rounded-3xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-900 transition hover:bg-slate-100">Crear cita mañana</button>
                    <button type="button" onclick="addQuick('Crear cita para Cliente B el 25/04/2026 a las 14:00 para presentación')" class="rounded-3xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-900 transition hover:bg-slate-100">Programar reunión</button>
                    <button type="button" onclick="addQuick('Mostrar citas de hoy')" class="rounded-3xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-900 transition hover:bg-slate-100">Ver citas de hoy</button>

    </div>

        <script type="module" src="../logic/auth.js"></script>
    <script defer src="../logic/chatbot.js"></script>
    <script defer src="../logic/navigation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Instanciar la nueva clase ChatbotManager de tu compañero
            setTimeout(() => {
                if (typeof ChatbotManager !== 'undefined') {
                    const manager = new ChatbotManager(window.navManager);
                    const container = document.getElementById('chatbot-container');
                    container.innerHTML = manager.render();
                    manager.setupListeners();
                }
            }, 100);
            
            // Función global para botones rápidos
            window.addQuick = function(texto) {
                const input = document.getElementById('chat-input');
                if (input) {
                    input.value = texto;
                    input.focus();
                }
            };
        });
    </script>

</body>
